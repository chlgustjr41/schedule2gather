# This file was auto-generated by the Firebase CLI and extended for full CI.
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (root)
        run: npm test

      - name: Install functions deps
        working-directory: functions
        run: npm ci

      - name: Test (functions)
        working-directory: functions
        run: npm test

      - name: Build (functions)
        working-directory: functions
        run: npm run build

      - name: Build (root)
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        run: npm run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SCHEDULE2GATHER }}
          channelId: live
          projectId: schedule2gather

      - name: Deploy Functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SCHEDULE2GATHER }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
          npx firebase-tools@latest deploy --only functions --project schedule2gather --non-interactive

      # gen-2 callables sometimes lose the public invoker binding on redeploy via service account.
      # Idempotently re-grant `allUsers: run.invoker` so the function stays publicly callable.
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SCHEDULE2GATHER }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: Ensure Cloud Run public invoker on createEvent
        run: |
          gcloud run services add-iam-policy-binding createevent \
            --region=us-central1 \
            --project=schedule2gather \
            --member=allUsers \
            --role=roles/run.invoker
